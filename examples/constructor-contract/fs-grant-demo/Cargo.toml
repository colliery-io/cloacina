# CLOACI-T-0834 — runnable end-to-end demo of constructor capability GRANTS.
#
# Standalone crate (empty [workspace]) that packages the sibling `cloacina-provider-fs`
# author crate into a WASM provider, then runs the SAME constructor in two workflows:
#   * `granted`   — `grants = { fs = ["ro:<dir>"] }` → the sandboxed read SUCCEEDS.
#   * `ungranted` — no grants (default-closed)       → the sandboxed read is DENIED.
#
# The `constructors-wasm` feature on cloacina pulls in wasmtime + the constructor
# loader; the embedded DefaultRunner uses the default sqlite lane.
[package]
name = "fs-grant-demo"
version = "0.1.0"
edition = "2021"
publish = false

[workspace]

[dependencies]
cloacina = { path = "../../../crates/cloacina", features = ["constructors-wasm"] }
cloacina-workflow = { path = "../../../crates/cloacina-workflow" }
tokio = { version = "1.0", features = ["full"] }
serde_json = "1.0"
tempfile = "3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
bincode = "1.3"
uuid = { version = "1", features = ["v4"] }

[build-dependencies]
cloacina-build = { path = "../../../crates/cloacina-build" }
