# CLOACI-T-0836 — a PACKAGED consumer workflow that uses a constructor provider.
#
# TEMPLATE — `__WORKSPACE__` is rewritten to an absolute path by the test that
# builds this fixture (mirrors examples/fixtures/compiler-happy-rust). Builds as a
# `packaged` cdylib: the `constructor!` node lowers to a ConstructorEntry
# DECLARATION (id/from/constructor/config/grants/deps) that the server resolves
# against the package's BUNDLED provider at load (reconciler Step 5b).
[workspace]

[package]
name = "packaged-consumer-fixture"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["packaged"]
packaged = []

[dependencies]
cloacina-macros = { path = "__WORKSPACE__/crates/cloacina-macros" }
cloacina-computation-graph = { path = "__WORKSPACE__/crates/cloacina-computation-graph" }
cloacina-workflow = { path = "__WORKSPACE__/crates/cloacina-workflow", features = ["packaged"] }
cloacina-workflow-plugin = { path = "__WORKSPACE__/crates/cloacina-workflow-plugin" }
serde_json = "1.0"
futures = "0.3"
async-trait = "0.1"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4"] }
tokio = { version = "1.0", features = ["time"] }

[build-dependencies]
cloacina-build = { path = "__WORKSPACE__/crates/cloacina-build" }
