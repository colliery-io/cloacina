[package]
name = "performance-computation-graph"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
cloacina = { path = "../../../crates/cloacina" }
cloacina-computation-graph = { path = "../../../crates/cloacina-computation-graph" }
cloacina-macros = { path = "../../../crates/cloacina-macros" }
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = "0.3"
async-trait = "0.1"
ctor = "0.2"
clap = { version = "4.0", features = ["derive"] }

[[bin]]
name = "performance-computation-graph"
path = "src/main.rs"

[[bin]]
name = "cg-bench"
path = "src/bench.rs"

[build-dependencies]
cloacina-build = { path = "../../../crates/cloacina-build" }
