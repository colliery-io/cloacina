[package]
name = "packaged-graph-example"
version = "0.1.0"
edition = "2021"

[workspace]

[features]
default = ["packaged"]
packaged = []

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
cloacina-computation-graph = "0.10"
cloacina-macros = "0.10"
cloacina-workflow = { version = "0.10", features = ["packaged"] }
cloacina-workflow-plugin = "0.10"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# CLOACI-T-0768: typed inject/fire interface for the orderbook/pricing boundaries.
schemars = "0.8"
async-trait = "0.1"
tokio = { version = "1.0", features = ["full"] }

[build-dependencies]
cloacina-build = "0.10"
