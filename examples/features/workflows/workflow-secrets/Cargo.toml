[workspace]

[package]
name = "workflow-secrets-demo"
version = "0.1.0"
edition = "2021"

[features]
default = ["packaged"]
packaged = []

[lib]
crate-type = ["cdylib", "rlib"]

# Production-shaped: crates.io version deps (what `cloacinactl package new`
# emits). Dev stacks resolve these against the local workspace via the
# compiler's `--dev-workspace` flag; production compilers use crates.io.
[dependencies]
cloacina-macros = "0.10"
cloacina-computation-graph = "0.10"
cloacina-workflow = { version = "0.10", features = ["packaged"] }
cloacina-workflow-plugin = "0.10"
serde_json = "1.0"
futures = "0.3"
async-trait = "0.1"
tracing = "0.1"

[build-dependencies]
cloacina-build = "0.10"
