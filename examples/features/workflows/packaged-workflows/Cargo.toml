[package]
name = "packaged-workflow-example"
version = "0.1.0"
edition = "2021"

[workspace]

[features]
default = ["packaged"]
packaged = []

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
cloacina-macros = "0.10"
cloacina-computation-graph = "0.10"
cloacina-workflow = { version = "0.10", features = ["packaged"] }
cloacina-workflow-plugin = "0.10"
serde_json = "1.0"
async-trait = "0.1"
futures = "0.3"  # Lightweight async executor for macro-generated code
# User workflow dependencies:
chrono = "0.4"
tokio = { version = "1.0", features = ["time"] }
tracing = "0.1"

[dev-dependencies]
cloacina = { version = "0.10", default-features = false, features = ["macros", "sqlite"] }

[build-dependencies]
cloacina-build = "0.10"
