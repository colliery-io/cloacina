[package]
name = "continuous-scheduling-example"
version = "0.1.0"
edition = "2021"

[workspace]

[dependencies]
cloacina = { path = "../../../crates/cloacina", default-features = false, features = ["postgres"] }
cloacina-workflow = { path = "../../../crates/cloacina-workflow" }
async-trait = "0.1"
chrono = { version = "0.4", features = ["serde"] }
serde_json = "1.0"
parking_lot = "0.12"
tokio = { version = "1", features = ["full"] }

[build-dependencies]
cloacina-build = { path = "../../../crates/cloacina-build" }
