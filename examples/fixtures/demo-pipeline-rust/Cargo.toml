# TEMPLATE — `__WORKSPACE__` is rewritten to an absolute path by the harness
# (host: repo root; in-cluster compiler: /workspace) before packing.
[workspace]

[package]
name = "demo-pipeline-rust"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[features]
default = ["packaged"]
packaged = []

[dependencies]
cloacina-macros = { path = "__WORKSPACE__/crates/cloacina-macros" }
cloacina-computation-graph = { path = "__WORKSPACE__/crates/cloacina-computation-graph" }
cloacina-workflow = { path = "__WORKSPACE__/crates/cloacina-workflow", features = ["packaged"] }
cloacina-workflow-plugin = { path = "__WORKSPACE__/crates/cloacina-workflow-plugin" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# CLOACI-T-0768: opts the boundary types into typed inject/fire interfaces.
schemars = "0.8"
futures = "0.3"
async-trait = "0.1"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.0", features = ["v4"] }
tokio = { version = "1.0", features = ["time"] }

[build-dependencies]
cloacina-build = { path = "__WORKSPACE__/crates/cloacina-build" }
