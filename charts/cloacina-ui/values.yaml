---
# Default values for cloacina-ui.
# CLOACI-I-0117 / T-0659.

# ---------------------------------------------------------------------------
# Image
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/colliery-software/cloacina-ui
  # Defaults to .Chart.AppVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ---------------------------------------------------------------------------
# Replicas + scheduling
# ---------------------------------------------------------------------------
replicaCount: 1

updateStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

nodeSelector: {}
tolerations: []
affinity: {}

# ---------------------------------------------------------------------------
# Resources — static asset serving is cheap.
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 128Mi

# ---------------------------------------------------------------------------
# Runtime config (OQ-5)
#
# The image is server-agnostic; this URL is injected at container start
# into window.__CLOACINA_CONFIG__ and prefills the /connect form. It is the
# URL the *browser* uses to reach cloacina-server — i.e. the server's
# public/ingress address, not its in-cluster Service DNS. Leave empty to
# have the UI ask the user on /connect.
#
# Remember: the browser calls the server cross-origin, so the server must
# allow this UI's origin via CLOACINA_CORS_ALLOWED_ORIGINS (REQ-009).
# ---------------------------------------------------------------------------
serverUrl: ""

# Extra environment vars merged into the container's env list.
extraEnv: []

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  annotations: {}

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: cloacina-ui.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: cloacina-ui-tls
  #   hosts:
  #     - cloacina-ui.example.com

# ---------------------------------------------------------------------------
# Probes — nginx serves the SPA; / returns 200 once up.
# ---------------------------------------------------------------------------
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 2
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# ---------------------------------------------------------------------------
# Pod / container security
#
# nginx:alpine needs writable cache/pid/run paths and the entrypoint
# renders index.html at start, so the root filesystem is left writable.
# Tighten with read-only-root + emptyDir mounts in a hardened deployment.
# ---------------------------------------------------------------------------
podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    # nginx master binds :80 (a privileged port) — add NET_BIND_SERVICE
    # back, or run behind a Service on a high containerPort instead.
    add:
      - NET_BIND_SERVICE

podAnnotations: {}
podLabels: {}
