{{- include "cloacina-server.validateDatabase" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloacina-server.fullname" . }}
  labels:
    {{- include "cloacina-server.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    {{- toYaml .Values.updateStrategy | nindent 4 }}
  selector:
    matchLabels:
      {{- include "cloacina-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "cloacina-server.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if eq .Values.fleet.actuator "kubernetes" }}
      # Bind the least-privilege fleet RBAC (REQ-006) so the K8s actuator can
      # provision per-tenant namespaces + agent Deployments.
      serviceAccountName: {{ include "cloacina-server.fleetServiceAccountName" . }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: cloacina-server
          image: {{ include "cloacina-server.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--bind"
            - {{ .Values.server.bind | quote }}
            - "--tenant-runner-cache-size"
            - {{ .Values.server.tenantRunnerCacheSize | quote }}
            - "--tenant-deletion-drain-timeout-s"
            - {{ .Values.server.tenantDeletionDrainTimeoutSeconds | quote }}
            {{- if .Values.server.requireSignatures }}
            - "--require-signatures"
            {{- end }}
            {{- if .Values.server.verificationOrgId }}
            - "--verification-org-id"
            - {{ .Values.server.verificationOrgId | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgresql.auth.username }}:{{ .Values.postgresql.auth.password }}@{{ .Release.Name }}-postgresql:5432/{{ .Values.postgresql.auth.database }}"
            {{- else if .Values.databaseUrlSecretRef.name }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.databaseUrlSecretRef.name }}
                  key: {{ .Values.databaseUrlSecretRef.key }}
            {{- else }}
            - name: DATABASE_URL
              value: {{ .Values.database.url | quote }}
            {{- end }}
            {{- if .Values.apiKeySecretRef.name }}
            - name: CLOACINA_BOOTSTRAP_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.apiKeySecretRef.name }}
                  key: {{ .Values.apiKeySecretRef.key }}
            {{- end }}
            {{- if eq .Values.fleet.actuator "kubernetes" }}
            # Fleet actuator (CLOACI-T-0814). Selects the K8s substrate; the
            # actuator scales a per-tenant cloacina-agent Deployment.
            - name: CLOACINA_FLEET_ACTUATOR
              value: "kubernetes"
            - name: CLOACINA_AGENT_IMAGE
              value: {{ .Values.fleet.agentImage | quote }}
            - name: CLOACINA_AGENT_SERVER_URL
              value: {{ .Values.fleet.agentServerUrl | default (printf "http://%s.%s.svc.cluster.local:%v" (include "cloacina-server.fullname" .) .Release.Namespace .Values.service.port) | quote }}
            # Agent pod resource requests/limits (CLOACI-T-0819) — applied by the
            # actuator to every cloacina-agent pod it creates.
            - name: CLOACINA_AGENT_CPU_REQUEST
              value: {{ .Values.fleet.agentResources.requests.cpu | quote }}
            - name: CLOACINA_AGENT_MEMORY_REQUEST
              value: {{ .Values.fleet.agentResources.requests.memory | quote }}
            - name: CLOACINA_AGENT_CPU_LIMIT
              value: {{ .Values.fleet.agentResources.limits.cpu | quote }}
            - name: CLOACINA_AGENT_MEMORY_LIMIT
              value: {{ .Values.fleet.agentResources.limits.memory | quote }}
            # Per-tenant agent NetworkPolicy (CLOACI-T-0819, REQ-007). The actuator
            # needs the server's namespace + pod selector so its egress rule can
            # allow agents → server. The namespace is THIS release's namespace; the
            # selector is the chart's selectorLabels (which the server pods carry).
            - name: CLOACINA_FLEET_NETWORK_POLICY
              value: {{ .Values.fleet.networkPolicy.enabled | quote }}
            {{- if .Values.fleet.networkPolicy.enabled }}
            - name: CLOACINA_SERVER_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: CLOACINA_SERVER_POD_SELECTOR
              value: {{ include "cloacina-server.selectorLabelsCSV" . | quote }}
            - name: CLOACINA_SERVER_PORT
              value: {{ .Values.service.port | quote }}
            - name: CLOACINA_FLEET_DNS_NAMESPACE
              value: {{ .Values.fleet.networkPolicy.dnsNamespace | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.server.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: home
              mountPath: /home/cloacina
            - name: tmp
              mountPath: /tmp
      volumes:
        # readOnlyRootFilesystem requires emptyDirs for any writable paths.
        - name: home
          emptyDir: {}
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- else }}
      # Default soft pod-anti-affinity (CLOACI-T-0819): prefer spreading server
      # replicas across hostnames so replicaCount>1 survives a single node loss,
      # without ever blocking scheduling (preferred, not required). Override by
      # setting .Values.affinity.
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "cloacina-server.selectorLabels" . | nindent 20 }}
      {{- end }}
