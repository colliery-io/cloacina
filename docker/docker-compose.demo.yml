---
# Cloacina UI DEMO stack (CLOACI-I-0117 / T-0660): a self-contained
# "stand it up and watch it run" profile —
#   postgres + server + compiler + (one-shot) fixtures-packer + harness + UI.
#
#   docker compose -f docker/docker-compose.demo.yml up --build
#   → UI at  http://localhost:8082   (connects to the server at :8080)
#     The harness fires a mix of fast / slow / failing runs every few seconds,
#     so the dashboard and live execution view always have something moving.
#
# Flow: the `fixtures` service packs the demo workflows (paths baked to
# /workspace) into a shared volume; the `compiler` builds those uploaded
# packages (pending → success); the `harness` uploads them and drives
# executions; the UI renders it live.
#
# Build: server + compiler + fixtures all come from docker/Dockerfile.demo,
# which compiles the workspace ONCE in a shared builder stage (the compiler and
# fixtures services even share the same `workspace` image). First build is still
# sizeable but no longer triples the compile.
#
# CORS: the browser loads the SPA from :8082 and calls the server at :8080
# cross-origin, so the server allows that origin (REQ-009).

# Project name: containers become cloacina-demo-<service>-1 instead of docker-*
# (the default project name came from the docker/ directory).
name: cloacina-demo

x-bootstrap-key: &bootstrap_key "clk_demo_bootstrap_key_0001"
x-db-url: &db_url "postgres://cloacina:cloacina@postgres:5432/cloacina"
# CLOACI-T-0779 — multi-tenancy demo. Deterministic tenant-SCOPED keys (NOT admin)
# so the demo shows isolation: each only sees its own tenant; the other 403s.
# Seeded at server bootstrap from CLOACINA_DEMO_TENANT_KEYS below.
x-public-key: &public_key "clk_demo_public_key_0003"
x-acme-key: &acme_key "clk_demo_acme_key_0002"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cloacina
      POSTGRES_PASSWORD: cloacina
      POSTGRES_DB: cloacina
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloacina"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Kafka broker (KRaft, single node) for Kafka-sourced stream/batch
  # accumulators. The in-network server reaches it as `kafka:9092` — the
  # advertised listener MUST be `kafka:9092` (not localhost) so in-cluster
  # clients connect. The soak's producer execs inside this container
  # (`docker compose exec kafka …`), so no host port is required. (CLOACI-T-0676)
  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      CLUSTER_ID: cloacina-demo-cluster-001
    volumes:
      - kafkadata:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # Dex — OIDC test issuer for the relying party (CLOACI-I-0118 / T-0788).
  # A self-contained issuer (static client `cloacina` + a password user) so the
  # OIDC login flow runs with no external IdP. Demo-only (in-memory, static).
  dex:
    image: dexidp/dex:v2.41.1
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./dex-config.yaml:/etc/dex/config.yaml:ro
    ports:
      - "5556:5556"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:5556/dex/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo
      target: server
    command:
      - "--database-url"
      - *db_url
      - "--bind"
      - "0.0.0.0:8080"
      - "--bootstrap-key"
      - *bootstrap_key
    environment:
      CLOACINA_CORS_ALLOWED_ORIGINS: "http://localhost:8082"
      # Resolves the `{{ KAFKA_BROKER }}` token in Kafka-stream accumulator
      # configs (e.g. demo-kafka-stream-rust) to the in-network broker.
      CLOACINA_VAR_KAFKA_BROKER: "kafka:9092"
      # Route all task execution to the execution-agent fleet instead of the
      # server's in-process executor (CLOACI-I-0114). The `agent` services below
      # register over WS, fetch cdylibs by digest, run tasks, and report back.
      CLOACINA_DEFAULT_EXECUTOR: "fleet"
      # CLOACI-T-0779: seed deterministic tenant-scoped keys for the isolation
      # demo (tenant:key:role). Both are tenant-admin (full access within their
      # tenant, never cross-tenant). The admin bootstrap key still seeds/manages.
      CLOACINA_DEMO_TENANT_KEYS: "public:clk_demo_public_key_0003:admin,acme:clk_demo_acme_key_0002:admin"
      # OIDC relying party (CLOACI-I-0118) against the dex sidecar. The browser
      # needs `127.0.0.1 host.docker.internal` in /etc/hosts (see dex-config.yaml);
      # group `acme-admins` → tenant acme / admin via the allowlist (OIDC_MAP).
      CLOACINA_OIDC_ISSUER: "http://host.docker.internal:5556/dex"
      CLOACINA_OIDC_CLIENT_ID: "cloacina"
      CLOACINA_OIDC_CLIENT_SECRET: "cloacina-dex-secret"
      CLOACINA_OIDC_REDIRECT_URI: "http://localhost:8080/v1/auth/callback"
      # Allowlist: Dex static-password users carry no groups, so map on the
      # email domain (released via the `email` scope). acme.com identities get
      # BOTH tenants (acme admin + public read) to demo multi-tenant SSO — one
      # sign-in, a key per tenant, the UI picks. The group rule is kept for real
      # IdPs (Keycloak/Okta) that emit groups.
      CLOACINA_OIDC_MAP: "group:acme-admins=acme:admin;domain:acme.com=acme:admin;domain:acme.com=public:read"
      # On success the server hands the minted key to the SPA via the URL
      # fragment at this address (the demo UI origin).
      CLOACINA_OIDC_SUCCESS_REDIRECT: "http://localhost:8082/connect"
    depends_on:
      postgres:
        condition: service_healthy
      # Kafka-sourced stream accumulators connect at CG-load time, so the broker
      # must be ready before the reconciler loads those packages. (CLOACI-T-0676)
      kafka:
        condition: service_healthy
      # OIDC discovery runs at boot; dex must be serving first.
      dex:
        condition: service_healthy
    # Server + compiler both run DB migrations on boot; on a fresh DB they can
    # race (duplicate type creation). restart:on-failure lets the loser retry
    # once the winner's migrations have landed.
    restart: on-failure
    ports:
      - "8080:8080"

  # In-cluster build service: compiles uploaded packages (pending → success).
  # `--cargo-flag build --lib` drops the default --frozen (the demo fixtures
  # carry no committed Cargo.lock). restart:on-failure rides out the one-time
  # migration race with the server on a fresh DB (both migrate on boot).
  compiler:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo
      target: workspace
    command:
      - "--bind"
      - "0.0.0.0:9000"
      - "--database-url"
      - *db_url
      - "--poll-interval-ms"
      - "1000"
      # Tell the compiler the target dir explicitly (not just via the image's
      # CARGO_TARGET_DIR env) so it looks for the built cdylib where cargo wrote
      # it — otherwise it checks the package's local target/debug and fails.
      - "--cargo-target-dir"
      - "/workspace/target"
      - "--cargo-flag=build"
      - "--cargo-flag=--lib"
    environment:
      # Override the compiler's default (line-tables-only) down to NO debuginfo
      # for the memory-tightest build on a constrained Docker VM — full
      # debuginfo OOM-killed complex-dag-example (it pulls in the heavy
      # `cloacina` lib). The demo never debugs the compiled cdylibs.
      CARGO_PROFILE_DEV_DEBUG: "0"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # CLOACI-T-0779 — PER-TENANT compiler for build ISOLATION. Scoped to the `acme`
  # schema via --tenant-schema: it claims and builds ONLY acme's pending packages,
  # writes build logs into acme's schema, and uses its OWN target dir — so a
  # tenant's source, build logs, and artifacts never mix with another's. This
  # mirrors the tenant-scoped agent fleet (one worker per tenant); in production
  # you'd provision a compiler per tenant. It tolerates the acme schema not
  # existing yet (the loop retries until harness-acme creates it), and is
  # sequenced after the public seed so its one-time dep build doesn't compete.
  compiler-acme:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo
      target: workspace
    command:
      - "--bind"
      - "0.0.0.0:9000"
      - "--database-url"
      - *db_url
      - "--tenant-schema"
      - "acme"
      - "--poll-interval-ms"
      - "1000"
      # Shares the framework build cache (the cloacina crates are identical for
      # every tenant — not tenant data — so rebuilding them per-tenant would be
      # pure waste). Isolation that MATTERS is already enforced: this process
      # claims only acme's packages, extracts each build's source to its own temp
      # dir, and writes build logs into acme's schema. Sequenced after the public
      # seed, so the public compiler is idle → no target-dir lock contention.
      - "--cargo-target-dir"
      - "/workspace/target"
      - "--cargo-flag=build"
      - "--cargo-flag=--lib"
    environment:
      CARGO_PROFILE_DEV_DEBUG: "0"
    depends_on:
      postgres:
        condition: service_healthy
      harness:
        condition: service_completed_successfully
    restart: on-failure

  # CLOACI-T-0780 — PER-TARGET compiler (multi-arch). Runs in an EMULATED
  # linux/amd64 container (Rosetta — qemu segfaults compiling Rust), so its NATIVE
  # cargo build produces x86_64 cdylibs with no cross-toolchains. --build-target
  # makes it scan-and-fill package_artifacts[x86_64-linux] for EVERY success package
  # lacking that arch (the intended "compile everything available" topology — one
  # per-target compiler per arch the fleet runs, so any agent can run any package),
  # ADDITIVELY: it never touches the aarch64 primary in workflow_packages, so it
  # can't race the host compiler. Opt-in via the `multiarch` profile; the first run
  # backfills the whole catalog under emulation, so it's slow to converge.
  compiler-x86:
    platform: linux/amd64
    profiles: ["multiarch"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo
      target: workspace
      args:
        # CLOACI-T-0780: build ONLY the binaries this image runs — skip the heavy
        # cloacina-server stack the per-target compiler never executes (cuts most
        # of the emulated amd64 compile).
        CARGO_BINS: "cloacina-compiler cloacinactl"
    command:
      - "--bind"
      - "0.0.0.0:9000"
      - "--database-url"
      - *db_url
      - "--build-target"
      - "x86_64-linux"
      # No --build-target-package: scan-and-fill the WHOLE catalog for x86 (the real
      # heterogeneous topology). Add the flag back to scope it to one package.
      - "--poll-interval-ms"
      - "2000"
      # Separate target dir: a native amd64 build must NOT share the aarch64
      # compiler's /workspace/target (same path, different-arch object files).
      - "--cargo-target-dir"
      - "/workspace/target-x86"
      - "--cargo-flag=build"
      - "--cargo-flag=--lib"
    environment:
      CARGO_PROFILE_DEV_DEBUG: "0"
    depends_on:
      postgres:
        condition: service_healthy
      harness:
        condition: service_completed_successfully
    restart: on-failure

  # One-shot: pack the demo fixtures (paths → /workspace) into the shared
  # volume the harness uploads from. Exits when done. Reuses the `workspace`
  # image (same build as the compiler — built once), overriding the entrypoint
  # to run the packer instead of the compiler.
  fixtures:
    build:
      context: ..
      dockerfile: docker/Dockerfile.demo
      target: workspace
    entrypoint: ["/usr/local/bin/pack-demo-fixtures.sh"]
    volumes:
      - fixtures-pkgs:/out

  ui:
    build:
      context: ..
      dockerfile: ui/Dockerfile
    environment:
      CLOACINA_SERVER_URL: "http://localhost:8080"
    depends_on:
      - server
    ports:
      - "8082:80"

  harness:
    build:
      context: ..
      dockerfile: ui/harness/Dockerfile
    environment:
      HARNESS_SERVER_URL: "http://server:8080"
      HARNESS_API_KEY: *bootstrap_key
      HARNESS_TENANT: "public"
      # seed = one-shot: upload + register all packages, fire one
      # completed/failed/in-flight run, then exit. The cron trigger keeps the
      # Triggers view live on its own schedule — no continuous harness loop.
      HARNESS_MODE: "seed"
      HARNESS_PACKAGE_DIR: "/packages"
      # CLOACI-T-0779: public gets everything EXCEPT the acme tenant's packages.
      HARNESS_PACKAGES_EXCLUDE: "acme-"
    depends_on:
      server:
        condition: service_started
      fixtures:
        condition: service_completed_successfully
    # The server may still be migrating/restarting when we start; the driver
    # waits for /health, but restart:on-failure covers a cold-start overrun.
    restart: on-failure
    volumes:
      - fixtures-pkgs:/packages:ro

  # CLOACI-T-0779 — second tenant ("acme") for the isolation demo. One-shot seed:
  # creates the tenant (admin bootstrap key), uploads a CURATED SUBSET of the demo
  # packages (so acme looks visibly different from public, which has all), and
  # fires a couple of runs. Its own data lives in the `acme` Postgres schema;
  # connecting with the acme-scoped key (clk_demo_acme_key_0002) sees only this.
  # Runs after the public seed so the shared cdylibs are already compiled.
  harness-acme:
    build:
      context: ..
      dockerfile: ui/harness/Dockerfile
    environment:
      HARNESS_SERVER_URL: "http://server:8080"
      HARNESS_API_KEY: *bootstrap_key
      HARNESS_TENANT: "acme"
      HARNESS_MODE: "seed"
      HARNESS_PACKAGE_DIR: "/packages"
      # Acme's OWN distinctly-named packages (acme_billing / acme_payroll /
      # acme_fulfillment) — only these, so acme looks like a different company.
      HARNESS_PACKAGES: "acme-"
      # The seed fires a "slow" + a "fail" workflow; point both at acme workflows
      # (they just complete — the seed doesn't require an actual failure).
      HARNESS_SLOW_WORKFLOW: "acme_billing"
      HARNESS_FAIL_WORKFLOW: "acme_payroll"
    depends_on:
      server:
        condition: service_started
      fixtures:
        condition: service_completed_successfully
      harness:
        condition: service_completed_successfully
    restart: on-failure
    volumes:
      - fixtures-pkgs:/packages:ro

  # Live computation-graph data feed (CLOACI-I-0124 / WS-11). Once the seed has
  # loaded the packages, this pushes a continuous market-data stream into the CG
  # accumulators so the graphs actually fire and the UI shows live activity:
  # `orderbook`/`pricing` over the server WS producer endpoint (feeding
  # market_pipeline + market_maker) and the `demo.kafka.stream` topic over Kafka
  # (feeding kafka_alpha → demo_kafka_graph). Runs continuously.
  producer:
    build:
      context: ..
      dockerfile: ui/harness/Dockerfile
    environment:
      HARNESS_SERVER_URL: "http://server:8080"
      HARNESS_API_KEY: *bootstrap_key
      HARNESS_TENANT: "public"
      HARNESS_MODE: "produce"
      HARNESS_KAFKA_BROKER: "kafka:9092"
      HARNESS_KAFKA_TOPIC: "demo.kafka.stream"
      HARNESS_PRODUCE_INTERVAL_MS: "2000"
      # Socket accumulators in the compose demo, fed over WS so every
      # socket-sourced graph actually fires:
      #   - mixed_graph's `alpha`
      #   - demo_py_graph's `py_alpha`
      #   - demo_py_state's `py_window` (bounded rolling window — CLOACI-T-0688)
      #   - market_pipeline (demo-pipeline-rust) + the packaged-graph market
      #     maker share `orderbook` + `pricing` (when_any → fire on either)
      # (demo_kafka_graph's `kafka_alpha` is fed via Kafka above, not WS.)
      HARNESS_WS_ACCUMULATORS: "alpha,py_alpha,py_window,orderbook,pricing"
    depends_on:
      server:
        condition: service_started
      kafka:
        condition: service_healthy
      harness:
        condition: service_completed_successfully
    restart: on-failure

  # Execution-agent fleet (CLOACI-I-0114). DB-less workers: register with the
  # server over WS, fetch compiled cdylibs by digest, run tasks, report results.
  # The server routes all work here (CLOACINA_DEFAULT_EXECUTOR=fleet). Aggregate
  # capacity = replicas × max-concurrency = 3 × 16 = 48 concurrent tasks, which
  # is the real concurrency knob now that the in-process executor is bypassed.
  # Bumped from 4→16 (CLOACI-T-0743 follow-up): at 12 the fleet hit "no capacity"
  # under the demo's mixed load (cron + driver + producer-fed CGs), which blocked
  # the cron handoff and delayed a second due schedule. The demo workloads are
  # short and mostly I/O-bound, so the workers were idle, not saturated.
  agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    command:
      - "--server"
      - "http://server:8080"
      # CLOACI-T-0817: register under the PUBLIC tenant key, not the bootstrap
      # (None/admin) key. "public" is now a first-class tenant; the fleet
      # executor stamps public work as Some("public") and matches only
      # Some("public") agents, so a bootstrap-keyed (None) agent no longer
      # serves the public realm. The public key is seeded via
      # CLOACINA_DEMO_TENANT_KEYS (public:clk_demo_public_key_0003:admin).
      - "--api-key"
      - *public_key
      - "--max-concurrency"
      - "16"
    depends_on:
      server:
        condition: service_started
    # The agent exits cleanly (0) when the server's WS drops (e.g. a server
    # restart); unless-stopped revives it so the fleet self-heals across server
    # bounces instead of staying down.
    restart: unless-stopped
    deploy:
      replicas: 3

  # CLOACI-T-0779 — TENANT-scoped execution agents for `acme`. Register with the
  # acme-scoped key, so the server stamps them tenant_id=acme and the fleet
  # executor (which filters agents by a.tenant_id == task_tenant) routes ONLY
  # acme's tasks here — and acme's tasks run ONLY on these. That's execution
  # isolation: a tenant's work runs on its own agents, never another tenant's.
  # The `agent` fleet above serves the public realm — CLOACI-T-0817: it now
  # registers under the public-tenant key (Some("public")), not the bootstrap
  # (None) key, since "public" is a first-class tenant.
  agent-acme:
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    command:
      - "--server"
      - "http://server:8080"
      - "--api-key"
      - *acme_key
      - "--max-concurrency"
      - "8"
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped
    deploy:
      replicas: 2

  # CLOACI-T-0780 — EMULATED linux/amd64 execution agent. Registers with
  # target_triple=x86_64-linux (host_target_triple() in the amd64 container), so
  # the fleet dispatch hands it the x86_64 cdylib from package_artifacts (built by
  # compiler-x86) instead of the aarch64 primary — triple-matched dispatch proven
  # end-to-end. High max-concurrency so the greedy most-free-capacity selector
  # routes demo_slow tasks here. Public realm — CLOACI-T-0817: the public key
  # (Some("public")), not the bootstrap (None) key, so it serves public work
  # under the first-class "public" tenant. Opt-in via the `multiarch` profile.
  agent-x86:
    platform: linux/amd64
    profiles: ["multiarch"]
    build:
      context: ..
      dockerfile: docker/Dockerfile.agent
    command:
      - "--server"
      - "http://server:8080"
      - "--api-key"
      - *public_key
      - "--max-concurrency"
      - "32"
    depends_on:
      server:
        condition: service_started
    restart: unless-stopped

  # Continuous workflow driver (CLOACI-I-0124). The seed leaves a deterministic
  # completed/failed/in-flight state; this keeps firing demo_slow_workflow at
  # its natural (jittered) pace so the runtime / Gantt / combined-timeline
  # distribution views keep accumulating believable, varied multi-task runs.
  # Ticks faster than a run completes, so runs overlap and contend — part of
  # the variability the demo is meant to show.
  driver:
    build:
      context: ..
      dockerfile: ui/harness/Dockerfile
    environment:
      HARNESS_SERVER_URL: "http://server:8080"
      HARNESS_API_KEY: *bootstrap_key
      HARNESS_TENANT: "public"
      # Gentle enough that a run completes before the next fires — at a tighter
      # interval the slow workflow (with its jittered, occasionally-contended
      # runs) piles up unboundedly and the last tasks never finish in-window.
      HARNESS_MODE: "loop"
      HARNESS_INTERVAL_MS: "60000"
    depends_on:
      server:
        condition: service_started
      harness:
        condition: service_completed_successfully
    restart: on-failure

volumes:
  pgdata:
  fixtures-pkgs:
  kafkadata:
