baseURL = "https://colliery-io.github.io/cloacina"
title = "Cloacina Documentation"
theme = "hugo-geekdoc"
draft = false  # Set to true to mark all content as draft by default

pluralizeListTitles = false

# Geekdoc required configuration
pygmentsUseClasses = true
pygmentsCodeFences = true
disablePathToLower = true

# Required if you want to render robots.txt template
enableRobotsTXT = true

# Needed for mermaid shortcodes
[markup]
  [markup.goldmark.renderer]
    # Needed for mermaid shortcode or when nesting shortcodes (e.g. img within
    # columns or tabs)
    unsafe = true
  [markup.tableOfContents]
    startLevel = 1
    endLevel = 9

[taxonomies]
   tag = "tags"

[menu]
  [[menu.main]]
    name = "Start Here"
    url = "/start/"
    weight = 5
  [[menu.main]]
    name = "Embed the Library"
    url = "/embed/"
    weight = 10
  [[menu.main]]
    name = "Run the Service"
    url = "/service/"
    weight = 20
  [[menu.main]]
    name = "Engine & Primitives"
    url = "/engine/"
    weight = 30
  [[menu.main]]
    name = "Reference"
    url = "/reference/"
    weight = 40
  [[menu.main]]
    name = "Contributing"
    url = "/contributing/"
    weight = 60

[params]
  geekdocLogo = "logo.png"
  # Collapse sidebar sections by default — the reader sees the top-level doors
  # and expands only the one they're in (the active page's trail auto-expands).
  geekdocCollapseAllSections = true
