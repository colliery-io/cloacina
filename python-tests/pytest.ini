[tool:pytest]
minversion = 6.0
addopts = -ra -q --strict-markers
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests
    integration: Integration tests  
    postgres: Tests requiring PostgreSQL backend
    sqlite: Tests requiring SQLite backend
    dispatcher: Tests for the dispatcher package
    slow: Tests that take longer than usual
    network: Tests that require network access