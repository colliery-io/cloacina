# cargo-audit configuration for Cloacina.
#
# Ignored advisories are tracked by CLOACI-T-0623. Each entry must
# stay justified — when we bump the underlying crate or upstream drops
# the unmaintained dependency, the ignore should be removed here.
#
# Run `cargo audit` locally or via the nightly workflow to verify.

[advisories]
ignore = [
    # paste 1.0.x — unmaintained crate (advisory date 2024-10-07).
    # No fixed version exists; pulled in transitively via cel-interpreter.
    # Remove when cel-interpreter drops `paste`.
    "RUSTSEC-2024-0436",

    # instant 0.1.x — unmaintained crate.
    # No fixed version exists; pulled in transitively via notify -> cloacinactl.
    # Remove when notify drops `instant` (tracked upstream by notify-rs/notify#380).
    "RUSTSEC-2024-0384",

    # diesel 2.3.7 — three new unsound advisories landed 2026-04-24.
    # We pin `2.1` in cloacina/Cargo.toml; cargo resolves to 2.3.7. Fix
    # requires bumping to >= 2.4 with corresponding DAL API audit.
    # Tracked by CLOACI-T-0623; remove after the diesel upgrade lands.
    "RUSTSEC-2026-0111",   # UTF-8 corruption in SQLite backend
    "RUSTSEC-2026-0134",   # padding-byte UB in MySQL backend (unused)
    "RUSTSEC-2026-0135",   # transmute UB in SQLite debug-print path

    # lru 0.12.5 — `IterMut` violates Stacked Borrows.
    # Pulled by cloacina-server; fix is bumping to >= 0.13 (currently 0.18).
    # Tracked by CLOACI-T-0623.
    "RUSTSEC-2026-0002",

    # rand 0.8.5 — unsound with a custom logger using `rand::rng()`.
    # We do not use a custom logger; impact is theoretical for our usage.
    # Fix requires rand 0.9+ which has API breakage in cloacina-workflow.
    # Tracked by CLOACI-T-0623.
    "RUSTSEC-2026-0097",
]
