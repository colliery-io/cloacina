<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloacina</title>
    <!-- Aurora Dark redesign (CLOACI-I-0129): IBM Plex Sans (UI) + Plex Mono
         (ids/code/numbers). Self-hosting is a later hardening step. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!--
      Runtime config (CLOACI-I-0117 / OQ-5, finalized in T-0659): the deploy
      container rewrites this script with the target server URL so one image
      works against any server. Empty default → the /connect form asks.
    -->
    <script>
      window.__CLOACINA_CONFIG__ = { defaultServerUrl: "" };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
