# cloacina-ui nginx config (CLOACI-I-0117 / T-0659).
#
# Static SPA serving with history-API fallback: unknown paths resolve to
# index.html so client-side routing (React Router) owns the URL space.
# The UI talks to the server cross-origin over the SDK (CORS opt-in on the
# server side), so there is intentionally no API reverse-proxy here.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed Vite assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Runtime config must never be cached — it carries the server URL the
    # entrypoint injected for this deployment.
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
