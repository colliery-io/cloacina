[package]
name = "cloacinactl"
version.workspace = true
edition = "2021"
description = "Control tool for the Cloacina task orchestration engine."
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme.workspace = true

[[bin]]
name = "cloacinactl"
path = "src/main.rs"

[features]
default = ["postgres", "sqlite"]
postgres = ["cloacina/postgres"]
sqlite = ["cloacina/sqlite"]

[dependencies]
cloacina = { path = "../cloacina", default-features = false }
axum = { version = "0.8", features = ["multipart"] }
clap.workspace = true
anyhow.workspace = true
tokio = { version = "1.0", features = ["full"] }
chrono = { version = "0.4" }
dirs = { version = "5.0" }
hex = { version = "0.4" }
parking_lot = { version = "0.12" }
pyo3 = { version = "0.25", features = ["auto-initialize"] }
uuid = { version = "1.0", features = ["v4"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
toml = { version = "0.8" }
utoipa = { version = "5", features = ["axum_extras"] }
utoipa-swagger-ui = { version = "9", features = ["axum"] }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
metrics = { version = "0.24" }
metrics-exporter-prometheus = { version = "0.18" }
tower = { version = "0.5", features = ["limit"] }
tower-http = { version = "0.6", features = ["cors"] }

[dev-dependencies]
reqwest = { version = "0.12", features = ["json"] }

[build-dependencies]
pyo3-build-config = "0.25"
