---
name: "Unified Release"

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Step 1: Run nightly test suite as a release prerequisite
  # -----------------------------------------------------------------------

  nightly-suite:
    name: Release Validation (Nightly Suite)
    uses: ./.github/workflows/nightly.yml

  # -----------------------------------------------------------------------
  # Step 2: Version verification
  # -----------------------------------------------------------------------

  verify-version:
    name: Verify Version
    needs: [nightly-suite]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          tag_version=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          tag_version=${tag_version#v}
          cargo_version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "cloacina") | .version')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag version ($tag_version) doesn't match Cargo.toml version ($cargo_version)"
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Step 3: Publish to crates.io
  # -----------------------------------------------------------------------

  publish-cargo:
    name: Publish to crates.io
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://crates.io/crates/cloacina

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: |
          # Publish in dependency order. Treat "already published" as success
          # (idempotent re-runs); fail loud on any other error so silent publish
          # failures can't silently produce a partial release like cloacina@0.5.1
          # did under the previous `|| echo` mask.
          publish() {
            local crate="$1"
            # Capture cargo publish's own exit code via PIPESTATUS so pipefail
            # quirks (e.g., tee succeeding while cargo publish silently failed
            # in some edge cases) can't mask a real failure. cloacina@0.5.1 was
            # never published despite the prior `|| echo` mask reporting OK —
            # that's the failure mode this guards against.
            cargo publish -p "$crate" 2>&1 | tee /tmp/publish.log
            local rc=${PIPESTATUS[0]}
            if [ "$rc" -eq 0 ]; then
              echo "✓ $crate published"
            elif grep -qE "already (exists|uploaded)" /tmp/publish.log; then
              echo "○ $crate already published (skipping)"
            else
              echo "✗ $crate publish failed (exit $rc)"
              exit 1
            fi
          }

          # Tier 1: leaf authoring + types (no internal deps).
          publish cloacina-macros
          sleep 30
          publish cloacina-workflow
          sleep 30
          publish cloacina-build
          sleep 30
          publish cloacina-computation-graph
          sleep 30
          publish cloacina-workflow-plugin
          sleep 30
          publish cloacina-testing
          sleep 30

          # Tier 2: engine.
          publish cloacina
          sleep 30

          # Tier 3: Python runtime crate (depends on cloacina + cloacina-computation-graph).
          # Published to crates.io so cloacina-server (which depends on it) can resolve.
          # The `cloaca` Python wheel is a separate artifact built via maturin and
          # published to PyPI in a later job; this is the Rust-side crate.
          publish cloacina-python
          sleep 30

          # Tier 4: binaries (depend on cloacina + workflow-plugin + python).
          publish cloacinactl
          sleep 30
          publish cloacina-compiler
          sleep 30
          publish cloacina-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # -----------------------------------------------------------------------
  # Step 4: Build Python wheels (abi3 — one wheel per platform)
  # -----------------------------------------------------------------------

  build-wheels:
    name: Build Wheel (${{ matrix.target }})
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libpq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install libpq (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libpq
          echo "PQ_LIB_DIR=$(brew --prefix libpq)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --target ${{ matrix.target }} --manifest-path crates/cloacina-python/Cargo.toml

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: target/wheels/cloaca-*.whl
          retention-days: 14

  build-sdist:
    name: Build Source Distribution
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --manifest-path crates/cloacina-python/Cargo.toml

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloaca-sdist
          path: target/wheels/cloaca-*.tar.gz
          retention-days: 14

  # -----------------------------------------------------------------------
  # Step 5: Publish to PyPI
  # -----------------------------------------------------------------------

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://pypi.org/project/cloaca/

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: cloaca-sdist
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          password: ${{ secrets.PYPI_TOKEN }}
