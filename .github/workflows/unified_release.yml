---
name: "Unified Release"

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Step 1: Run nightly test suite as a release prerequisite
  # -----------------------------------------------------------------------

  nightly-suite:
    name: Release Validation (Nightly Suite)
    uses: ./.github/workflows/nightly.yml

  # -----------------------------------------------------------------------
  # Step 2: Version verification
  # -----------------------------------------------------------------------

  verify-version:
    name: Verify Version
    needs: [nightly-suite]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          tag_version=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          tag_version=${tag_version#v}
          cargo_version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "cloacina") | .version')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag version ($tag_version) doesn't match Cargo.toml version ($cargo_version)"
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Step 3: Publish to crates.io
  # -----------------------------------------------------------------------

  publish-cargo:
    name: Publish to crates.io
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://crates.io/crates/cloacina

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: |
          # Publish in dependency order, allowing already-published versions to pass
          cargo publish -p cloacina-macros || echo "cloacina-macros may already be published"
          sleep 30  # Wait for crates.io to propagate
          cargo publish -p cloacina-workflow || echo "cloacina-workflow may already be published"
          sleep 30  # Wait for crates.io to propagate
          cargo publish -p cloacina-build || echo "cloacina-build may already be published"
          sleep 30  # Wait for crates.io to propagate
          cargo publish -p cloacina-workflow-plugin || echo "cloacina-workflow-plugin may already be published"
          sleep 30  # Wait for crates.io to propagate
          cargo publish -p cloacina || echo "cloacina may already be published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # -----------------------------------------------------------------------
  # Step 4: Build Python wheels (abi3 — one wheel per platform)
  # -----------------------------------------------------------------------

  build-wheels:
    name: Build Wheel (${{ matrix.target }})
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install PostgreSQL client (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libpq
          echo "PQ_LIB_DIR=$(brew --prefix libpq)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --target ${{ matrix.target }} --manifest-path crates/cloacina/Cargo.toml

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: target/wheels/cloaca-*.whl
          retention-days: 14

  build-sdist:
    name: Build Source Distribution
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --manifest-path crates/cloacina/Cargo.toml

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloaca-sdist
          path: target/wheels/cloaca-*.tar.gz
          retention-days: 14

  # -----------------------------------------------------------------------
  # Step 5: Publish to PyPI
  # -----------------------------------------------------------------------

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://pypi.org/project/cloaca/

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: cloaca-sdist
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          password: ${{ secrets.PYPI_TOKEN }}
