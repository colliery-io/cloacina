---
name: "Unified Release"

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Step 1: Run nightly test suite as a release prerequisite
  # -----------------------------------------------------------------------

  nightly-suite:
    name: Release Validation (Nightly Suite)
    uses: ./.github/workflows/nightly.yml

  # -----------------------------------------------------------------------
  # Step 2: Version verification
  # -----------------------------------------------------------------------

  verify-version:
    name: Verify Version
    needs: [nightly-suite]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          tag_version=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          tag_version=${tag_version#v}
          cargo_version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "cloacina") | .version')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag version ($tag_version) doesn't match Cargo.toml version ($cargo_version)"
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Step 3: Build all artifacts and upload to GHA artifact registry
  # -----------------------------------------------------------------------

  build-rust:
    name: Build Rust Packages
    needs: [verify-version]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Build for release
        run: cargo build --release

      - name: Package crates
        run: |
          cargo package -p cloacina-macros --allow-dirty
          cargo package -p cloacina-workflow --allow-dirty
          cargo package -p cloacina --allow-dirty

      - name: Upload Rust package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-packages
          path: target/package/*.crate
          retention-days: 14

  # TODO: Python wheel/sdist build jobs will be added once native Python
  # packaging workflow is established (replaces old cloaca-backend builds)

  # -----------------------------------------------------------------------
  # Step 4: Manual approval gate — artifacts are ready, human says "send it"
  # -----------------------------------------------------------------------

  publish-cargo:
    name: Publish to crates.io
    needs: [build-rust]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://crates.io/crates/cloacina

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Download Rust package artifacts
        uses: actions/download-artifact@v4
        with:
          name: rust-packages
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Publish to crates.io
        run: |
          # Publish in dependency order, allowing already-published versions to pass
          cargo publish -p cloacina-macros || echo "cloacina-macros may already be published"
          sleep 30  # Wait for crates.io to propagate
          cargo publish -p cloacina-workflow || echo "cloacina-workflow may already be published"
          sleep 30  # Wait for crates.io to propagate
          cargo publish -p cloacina || echo "cloacina may already be published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
