---
name: "Unified Release"

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  issues: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Step 1: Run nightly test suite as a release prerequisite
  # -----------------------------------------------------------------------

  nightly-suite:
    name: Release Validation (Nightly Suite)
    uses: ./.github/workflows/nightly.yml

  # -----------------------------------------------------------------------
  # Step 2: Version verification
  # -----------------------------------------------------------------------

  verify-version:
    name: Verify Version
    needs: [nightly-suite]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          tag_version=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          tag_version=${tag_version#v}
          cargo_version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "cloacina") | .version')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag version ($tag_version) doesn't match Cargo.toml version ($cargo_version)"
            exit 1
          fi

  # -----------------------------------------------------------------------
  # Step 3: Publish to crates.io
  # -----------------------------------------------------------------------

  publish-cargo:
    name: Publish to crates.io
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://crates.io/crates/cloacina

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: |
          # Publish in dependency order, allowing already-published versions to pass
          cargo publish -p cloacina-macros || echo "cloacina-macros may already be published"
          sleep 30  # Wait for crates.io to propagate
          cargo publish -p cloacina-workflow || echo "cloacina-workflow may already be published"
          sleep 30  # Wait for crates.io to propagate
          cargo publish -p cloacina || echo "cloacina may already be published"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
