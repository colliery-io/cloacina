---
name: "Unified Release"

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Step 1: Run nightly test suite as a release prerequisite
  # -----------------------------------------------------------------------

  nightly-suite:
    name: Release Validation (Nightly Suite)
    uses: ./.github/workflows/nightly.yml
    # The caller's permissions are the ceiling for the called workflow. The
    # workflow-level block above is intentionally minimal, so grant here the
    # superset the nested nightly jobs need: packages:write (nightly-docker),
    # actions:write (prune-caches), issues:write (notify-failure/close-resolved),
    # contents:read (checkout). Without this the run fails at startup.
    permissions:
      contents: read
      packages: write
      actions: write
      issues: write

  # -----------------------------------------------------------------------
  # Step 2: Version verification
  # -----------------------------------------------------------------------

  verify-version:
    name: Verify Version
    needs: [nightly-suite]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify version matches tag
        run: |
          tag_version=${GITHUB_REF#refs/tags/}
          # Remove 'v' prefix if present
          tag_version=${tag_version#v}
          cargo_version=$(cargo metadata --format-version=1 --no-deps | jq -r '.packages[] | select(.name == "cloacina") | .version')
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "Tag version ($tag_version) doesn't match Cargo.toml version ($cargo_version)"
            exit 1
          fi

      # SDK lockstep (CLOACI-I-0113 / REQ-008): npm + PyPI client packages and
      # the committed OpenAPI doc must carry the workspace version.
      - name: Verify SDK versions in lockstep
        run: python3 scripts/check_sdk_versions.py

  # -----------------------------------------------------------------------
  # Step 3: Publish to crates.io
  # -----------------------------------------------------------------------

  publish-cargo:
    name: Publish to crates.io
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://crates.io/crates/cloacina

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: |
          # Publish in dependency order. Treat "already published" as success
          # (idempotent re-runs); fail loud on any other error so silent publish
          # failures can't silently produce a partial release like cloacina@0.5.1
          # did under the previous `|| echo` mask.
          publish() {
            local crate="$1"
            # Capture cargo publish's own exit code via PIPESTATUS so pipefail
            # quirks (e.g., tee succeeding while cargo publish silently failed
            # in some edge cases) can't mask a real failure. cloacina@0.5.1 was
            # never published despite the prior `|| echo` mask reporting OK —
            # that's the failure mode this guards against.
            cargo publish -p "$crate" 2>&1 | tee /tmp/publish.log
            local rc=${PIPESTATUS[0]}
            if [ "$rc" -eq 0 ]; then
              echo "✓ $crate published"
            elif grep -qE "already (exists|uploaded)" /tmp/publish.log; then
              echo "○ $crate already published (skipping)"
            else
              echo "✗ $crate publish failed (exit $rc)"
              exit 1
            fi
          }

          # Tier 1: leaf authoring + types (no internal deps).
          # cloacina-api-types first — cloacina itself depends on it (T-0642).
          publish cloacina-api-types
          sleep 30
          publish cloacina-macros
          sleep 30
          publish cloacina-workflow
          sleep 30
          publish cloacina-build
          sleep 30
          publish cloacina-computation-graph
          sleep 30
          publish cloacina-workflow-plugin
          sleep 30
          publish cloacina-testing
          sleep 30

          # Tier 2: engine.
          publish cloacina
          sleep 30

          # Tier 3: Python runtime crate (depends on cloacina + cloacina-computation-graph).
          # Published to crates.io so cloacina-server (which depends on it) can resolve.
          # The `cloaca` Python wheel is a separate artifact built via maturin and
          # published to PyPI in a later job; this is the Rust-side crate.
          publish cloacina-python
          sleep 30

          # Tier 3.5: service client SDK (depends on cloacina-api-types only;
          # must precede cloacinactl, which consumes it — T-0646).
          publish cloacina-client
          sleep 30

          # Tier 4: binaries (depend on cloacina + workflow-plugin + python).
          publish cloacinactl
          sleep 30
          publish cloacina-compiler
          sleep 30
          publish cloacina-server
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # -----------------------------------------------------------------------
  # Step 4: Build Python wheels (abi3 — one wheel per platform)
  # -----------------------------------------------------------------------

  build-wheels:
    name: Build Wheel (${{ matrix.target }})
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libpq (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install libpq (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libpq
          echo "PQ_LIB_DIR=$(brew --prefix libpq)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --target ${{ matrix.target }} --manifest-path crates/cloacina-python/Cargo.toml

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: target/wheels/cloaca-*.whl
          retention-days: 14

  build-sdist:
    name: Build Source Distribution
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: maturin sdist --manifest-path crates/cloacina-python/Cargo.toml

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloaca-sdist
          path: target/wheels/cloaca-*.tar.gz
          retention-days: 14

  # -----------------------------------------------------------------------
  # Step 5: Publish to PyPI
  # -----------------------------------------------------------------------

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://pypi.org/project/cloaca/

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          pattern: wheel-*
          merge-multiple: true

      - name: Download sdist artifact
        uses: actions/download-artifact@v4
        with:
          name: cloaca-sdist
          path: dist/

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          verbose: true
          password: ${{ secrets.PYPI_TOKEN }}
          # Tolerate idempotent re-runs of the release on the same tag: if a
          # prior run already uploaded these files, skip rather than 400. Mirrors
          # the "already published" handling in the crates.io publish job.
          skip-existing: true

  # -----------------------------------------------------------------------
  # Step 4c: Publish the TypeScript SDK to npm (CLOACI-I-0113 / T-0648).
  # Version-locked to the workspace release; idempotent on re-runs (skips
  # when the version already exists on the registry — same class of guard
  # as crates.io/PyPI above, learned the hard way on v0.7.0).
  # -----------------------------------------------------------------------

  publish-npm:
    name: Publish @cloacina/client to npm
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://www.npmjs.com/package/@cloacina/client

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build
        working-directory: clients/typescript
        run: |
          npm ci
          npm run check:generated
          npm run build

      - name: Publish (idempotent)
        working-directory: clients/typescript
        run: |
          version=$(node -p "require('./package.json').version")
          if npm view "@cloacina/client@${version}" version >/dev/null 2>&1; then
            echo "○ @cloacina/client@${version} already published (skipping)"
          else
            npm publish --access public
            echo "✓ @cloacina/client@${version} published"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # -----------------------------------------------------------------------
  # Step 4d: Publish the Python SDK (cloacina-client) to PyPI
  # (CLOACI-I-0113 / T-0648). Distinct from the `cloaca` embedded-runtime
  # wheels above — this is the pure-Python service client.
  # -----------------------------------------------------------------------

  publish-pypi-client:
    name: Publish cloacina-client to PyPI
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://pypi.org/project/cloacina-client/

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist + wheel
        working-directory: clients/python
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: clients/python/dist/
          verbose: true
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true

  # -----------------------------------------------------------------------
  # Step 5b: Build + upload cloacinactl release binaries (CLOACI-I-0111 / T-0603)
  #
  # Cross-compiles `cloacinactl` for the four supported targets, packages
  # each as a tarball with a SHA256 sidecar, and uploads them to the
  # GitHub Release for the tag. Powers `scripts/install.sh`.
  # -----------------------------------------------------------------------

  build-release-binaries:
    name: Build Binary (${{ matrix.target }})
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    # Creating the GitHub Release and uploading the cloacinactl tarballs needs
    # contents:write. The workflow-level default is contents:read, so grant it
    # here — without it the upload step 403s ("Resource not accessible by
    # integration") and the binaries / Release never appear.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install libpq (Linux native)
        if: runner.os == 'Linux' && matrix.cross == false
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install libpq (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libpq
          echo "PQ_LIB_DIR=$(brew --prefix libpq)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV

      - name: Install cross
        if: matrix.cross == true
        run: cargo install cross --locked --version 0.2.5

      - name: Build (native)
        if: matrix.cross == false
        run: cargo build --release --locked --target ${{ matrix.target }} --bin cloacinactl

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --locked --target ${{ matrix.target }} --bin cloacinactl

      - name: Strip binary
        if: runner.os == 'Linux' && matrix.cross == false
        run: strip target/${{ matrix.target }}/release/cloacinactl
      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip -x target/${{ matrix.target }}/release/cloacinactl

      - name: Package tarball + sha256 sidecar
        id: pack
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          tag="${TAG_REF#refs/tags/}"
          asset="cloacinactl-${tag}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" -czf "dist/${asset}" cloacinactl
          if command -v sha256sum >/dev/null 2>&1; then
            (cd dist && sha256sum "${asset}" > "${asset}.sha256")
          else
            (cd dist && shasum -a 256 "${asset}" > "${asset}.sha256")
          fi
          echo "asset=${asset}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact (intra-workflow)
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: dist/cloacinactl-*
          retention-days: 14

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/cloacinactl-*.tar.gz
            dist/cloacinactl-*.tar.gz.sha256
          fail_on_unmatched_files: true
          token: ${{ secrets.GITHUB_TOKEN }}

  # -----------------------------------------------------------------------
  # Step 5c: Build + push cloacina-server Docker image (CLOACI-I-0111 / T-0604)
  #
  # Multi-arch build via buildx, pushed to ghcr.io/<owner>/cloacina-server.
  # Tags applied: <semver>, <major>.<minor>, latest.
  # -----------------------------------------------------------------------

  publish-docker:
    name: Publish cloacina-server image
    needs: [verify-version]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute tags
        id: tags
        env:
          TAG_REF: ${{ github.ref }}
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          tag="${TAG_REF#refs/tags/}"     # vX.Y.Z
          version="${tag#v}"              # X.Y.Z
          major_minor="${version%.*}"     # X.Y
          owner_lc=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner_lc}/cloacina-server"
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          {
            echo "tag_list<<EOF"
            echo "${image}:${version}"
            echo "${image}:${major_minor}"
            echo "${image}:latest"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tag_list }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test (--version against linux/amd64)
        env:
          IMAGE: ${{ steps.tags.outputs.image }}
        run: |
          set -euo pipefail
          # The amd64 manifest is the runner's native arch; pull and
          # exercise --version. Verifies the entrypoint, the binary
          # actually runs, and clap reports the build version.
          docker run --rm "${IMAGE}:latest" --version

  # -----------------------------------------------------------------------
  # Step 5d: Publish Helm chart (CLOACI-I-0111 / T-0605)
  #
  # Packages charts/cloacina-server and pushes it as an OCI artifact to
  # ghcr.io/<owner>/charts/cloacina-server. Runs after publish-docker so
  # the image referenced by the chart's appVersion is guaranteed present.
  # -----------------------------------------------------------------------

  publish-helm:
    name: Publish Helm chart
    needs: [verify-version, publish-docker]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Set tag-derived chart version
        env:
          TAG_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          tag="${TAG_REF#refs/tags/}"
          version="${tag#v}"
          # Sync chart's `version` and `appVersion` to the release tag.
          # Chart's own internal versioning resumes its independent path
          # on the next non-release commit.
          sed -i -E "s/^version: .*/version: ${version}/" charts/cloacina-server/Chart.yaml
          sed -i -E "s/^appVersion: .*/appVersion: \"${version}\"/" charts/cloacina-server/Chart.yaml
          grep -E "^(version|appVersion):" charts/cloacina-server/Chart.yaml

      - name: Log in to ghcr.io (Helm OCI push)
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

      - name: Lint chart
        run: helm lint charts/cloacina-server

      - name: Package chart
        run: |
          mkdir -p dist-charts
          helm package charts/cloacina-server --destination dist-charts

      - name: Push chart to ghcr.io
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          owner_lc=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          chart_pkg=$(ls dist-charts/cloacina-server-*.tgz | head -n1)
          [ -n "${chart_pkg}" ] || { echo "no chart package found" >&2; exit 1; }
          helm push "${chart_pkg}" "oci://ghcr.io/${owner_lc}/charts"

  # -----------------------------------------------------------------------
  # Step 6: Cache hygiene
  #
  # Tag-scoped caches are write-once: they're only re-used if you re-run
  # the release workflow on the same tag, which is a degenerate case. Drop
  # them once publish has succeeded so they don't accumulate per release
  # (each tag was producing ~3 GB of GHA cache).
  # -----------------------------------------------------------------------

  prune-tag-caches:
    name: Prune Tag-Scoped Caches
    needs: [publish-cargo, publish-pypi, build-release-binaries, publish-docker, publish-helm]
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete caches for this tag ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          # The /caches list endpoint expects a normalized ref. Tag-scoped
          # caches are stored under the literal "refs/heads/<tag-ref>" path
          # GH actions cache writes them to — strip the leading "refs/" so
          # we match both representations seen in the cache list.
          ids=$(gh api --paginate "repos/${REPO}/actions/caches?per_page=100" \
            --jq ".actions_caches[] | select(.ref == \"${TAG_REF}\" or .ref == \"refs/heads/${TAG_REF}\") | .id")
          if [ -z "${ids}" ]; then
            echo "no tag-scoped caches for ${TAG_REF}"
            exit 0
          fi
          echo "${ids}" | while read id; do
            echo "deleting cache ${id}"
            gh api -X DELETE "repos/${REPO}/actions/caches/${id}" || true
          done
