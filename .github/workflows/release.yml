---
name: "Binary Release"

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: binary-release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Step 1: Extract version from tag
  # ---------------------------------------------------------------------------
  meta:
    name: Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Extract version from tag
        id: version
        run: |
          version=${GITHUB_REF#refs/tags/}
          echo "version=$version" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Step 2: Build binaries for each target
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    needs: [meta]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --bin cloacinactl --target ${{ matrix.target }}
          else
            cargo build --release --bin cloacinactl --target ${{ matrix.target }}
          fi

      - name: Strip binary
        run: |
          binary="target/${{ matrix.target }}/release/cloacinactl"
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              # cross-compiled; strip inside the cross container or skip
              docker run --rm \
                -v "$(pwd)/target/${{ matrix.target }}/release:/work" \
                ghcr.io/cross-rs/${{ matrix.target }}:main \
                aarch64-linux-gnu-strip /work/cloacinactl \
              || echo "Strip failed, continuing with unstripped binary"
              ;;
            *)
              strip "$binary"
              ;;
          esac

      - name: Create tarball and checksum
        run: |
          version="${{ needs.meta.outputs.version }}"
          target="${{ matrix.target }}"
          archive="cloacinactl-${version}-${target}.tar.gz"

          mkdir -p staging
          cp "target/${target}/release/cloacinactl" staging/
          cd staging
          tar czf "../${archive}" cloacinactl
          cd ..

          shasum -a 256 "${archive}" > "${archive}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cloacinactl-${{ matrix.target }}
          path: |
            cloacinactl-*.tar.gz
            cloacinactl-*.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Step 3: Create GitHub Release with all artifacts
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    needs: [meta, build]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: cloacinactl-*
          merge-multiple: true

      - name: List release artifacts
        run: ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.version }}
          name: ${{ needs.meta.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/cloacinactl-*.tar.gz
            artifacts/cloacinactl-*.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
