---
name: Nightly Tests

on:
  schedule:
    # Run at 3am UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch: {}
  # Allow release workflow to trigger nightly as a prerequisite
  workflow_call: {}

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Full test suite — unit, integration, macros, feature builds
  # -----------------------------------------------------------------------

  cloacina-tests:
    name: Full Test Suite
    uses: ./.github/workflows/cloacina.yml

  # -----------------------------------------------------------------------
  # Examples & tutorials validation
  # -----------------------------------------------------------------------

  examples-docs:
    name: Examples & Documentation
    uses: ./.github/workflows/examples-docs.yml

  # -----------------------------------------------------------------------
  # Code coverage — cargo-tarpaulin on cloacina core
  # -----------------------------------------------------------------------

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cloacina
          POSTGRES_PASSWORD: cloacina
          POSTGRES_DB: cloacina
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloacina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cloacina-coverage"

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      # Pre-build the primitive-only cdylib fixtures (T-0550 / I-0102 T-D).
      # `crates/cloacina/tests/integration/dal/reconciler_e2e_load.rs::read_fixture_dylib`
      # panics when these aren't on disk; the integration angreal task does
      # this pre-build but tarpaulin invokes cargo directly and bypasses it.
      # Mirrors `.angreal/test/integration.py::build_test_packages`.
      - name: Pre-build test fixtures
        run: |
          for fixture in reactor-only-rust reactor-subscriber-rust trigger-only-rust mixed-rust; do
            echo "Building $fixture..."
            (cd "examples/fixtures/$fixture" && cargo build -p "$fixture")
          done

      - name: Run coverage (cloacina core)
        run: |
          cargo tarpaulin \
            -p cloacina \
            --features postgres,sqlite,macros,kafka \
            --out xml \
            --output-dir target/coverage \
            --skip-clean \
            --timeout 300 \
            --exclude-files "crates/cloacina/tests/*" \
            --exclude-files "crates/cloacina/src/python/*" \
            -- --test-threads=1
        env:
          DATABASE_URL: postgres://cloacina:cloacina@localhost:5432/cloacina

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/coverage/cobertura.xml
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          if [ -f target/coverage/cobertura.xml ]; then
            echo "Coverage report generated successfully"
            # Extract line rate from cobertura XML
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' target/coverage/cobertura.xml | head -1)
            PERCENT=$(echo "$LINE_RATE * 100" | bc -l 2>/dev/null | head -c 5 || echo "N/A")
            echo "## Coverage: ${PERCENT}%" >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report not generated" >> $GITHUB_STEP_SUMMARY
          fi

  # -----------------------------------------------------------------------
  # macOS integration — verify builds on macOS
  # -----------------------------------------------------------------------

  macos-integration:
    name: macOS Integration
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install angreal
        run: |
          python -m pip install --upgrade pip
          pip install angreal

      - name: Start PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v7
        with:
          username: cloacina
          password: cloacina
          database: cloacina
          port: 5432

      - name: Install libpq
        run: |
          brew install libpq
          echo "LIBRARY_PATH=$(brew --prefix libpq)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cloacina-nightly-macos"

      - name: Build workspace
        run: cargo build --features "postgres,sqlite,macros,kafka"

      - name: Run unit tests
        run: angreal test unit

  # -----------------------------------------------------------------------
  # SDK contract matrix (CLOACI-I-0113 / T-0648)
  #
  # Boots cloacina-server on a fresh DB and runs all three SDK contract
  # suites (Rust, Python, TypeScript) against it — the drift gate between
  # utoipa annotations and handler behavior. Also enforces the static
  # coverage rule and SDK version lockstep. Release-blocking: this
  # workflow is the release gate (unified_release.yml calls it).
  # -----------------------------------------------------------------------

  sdk-contract:
    name: SDK Contract Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cloacina-nightly-sdk"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install angreal
        run: |
          python -m pip install --upgrade pip
          pip install angreal

      - name: Run SDK contract matrix
        run: angreal test sdk-contract

  # -----------------------------------------------------------------------
  # Nightly Docker image (CLOACI-I-0111 / T-0604)
  #
  # Pushes ghcr.io/<owner>/cloacina-server:nightly so users tracking the
  # bleeding edge get a fresh build every morning without waiting for a
  # tagged release.
  # -----------------------------------------------------------------------

  nightly-docker:
    name: Nightly cloacina-server image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: img
        env:
          REPO_OWNER: ${{ github.repository_owner }}
        run: |
          owner_lc=$(echo "${REPO_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${owner_lc}/cloacina-server" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push :nightly
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.img.outputs.image }}:nightly
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -----------------------------------------------------------------------
  # Failure notification — auto-create GitHub issue
  # -----------------------------------------------------------------------

  notify-failure:
    name: Notify on Failure
    needs: [cloacina-tests, examples-docs, coverage, macos-integration, nightly-docker]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check for existing nightly-failure issue
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-failure',
              state: 'open',
            });
            core.setOutput('exists', issues.data.length > 0 ? 'true' : 'false');
            if (issues.data.length > 0) {
              core.setOutput('issue_number', issues.data[0].number);
            }

      - name: Create GitHub Issue on failure
        if: steps.check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly test failure — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Nightly Test Failure',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Date:** ${new Date().toISOString()}`,
              '',
              'One or more nightly tests failed. Check the run logs for details.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['nightly-failure'],
            });

      - name: Comment on existing issue
        if: steps.check.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.check.outputs.issue_number }},
              body: `Still failing — [run ${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            });

  # -----------------------------------------------------------------------
  # Close resolved — auto-close nightly-failure issue on success
  # -----------------------------------------------------------------------

  close-resolved:
    name: Close Resolved Issues
    needs: [cloacina-tests, examples-docs, coverage, macos-integration, nightly-docker]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Close nightly-failure issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-failure',
              state: 'open',
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Resolved — nightly passed in [run ${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

  # -----------------------------------------------------------------------
  # Cache hygiene — keep storage usage down by pruning superseded caches
  #
  # Strategy:
  #   - Drop every cache scoped to a closed PR's ref (refs/pull/N/merge that
  #     no longer maps to an open PR — GH already does this after 7 days
  #     untouched, but we accelerate it).
  #   - On main, keep only the most recent cache per (key prefix, ref). Older
  #     caches for the same scope are superseded by the run that just
  #     finished and cost storage with no upside.
  #   - Never touch caches on refs/tags/*; the release workflow handles those.
  # -----------------------------------------------------------------------

  prune-caches:
    name: Prune Stale Caches
    needs: [cloacina-tests, examples-docs, coverage, macos-integration, nightly-docker]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete superseded caches on main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # List caches on main, group by key prefix (drop the trailing
          # restore-key hash component), keep the newest id per prefix,
          # delete the rest.
          gh api --paginate "repos/${REPO}/actions/caches?per_page=100&ref=refs/heads/main" \
            --jq '.actions_caches[] | [.id, .created_at, .key] | @tsv' \
              > caches.tsv || { echo "no caches"; exit 0; }
          if [ ! -s caches.tsv ]; then
            echo "no caches on main"
            exit 0
          fi
          # Strip the last "-<hash>" component to form a stable prefix.
          awk -F'\t' '{ n=split($3, a, "-"); prefix=""; for (i=1;i<n;i++) prefix = prefix (i>1 ? "-" : "") a[i]; print $1"\t"$2"\t"prefix }' caches.tsv \
            | sort -t$'\t' -k3,3 -k2,2r \
            | awk -F'\t' '!seen[$3]++ { keep[$1]=1; next } { print $1 }' > to_delete.txt
          if [ ! -s to_delete.txt ]; then
            echo "nothing superseded"
            exit 0
          fi
          echo "Deleting $(wc -l < to_delete.txt) superseded caches:"
          cat to_delete.txt
          while read id; do
            gh api -X DELETE "repos/${REPO}/actions/caches/${id}" || true
          done < to_delete.txt
