---
name: Nightly Tests

on:
  schedule:
    # Run at 3am UTC every day
    - cron: '0 3 * * *'
  workflow_dispatch: {}
  # Allow release workflow to trigger nightly as a prerequisite
  workflow_call: {}

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Full test suite — unit, integration, macros, feature builds
  # -----------------------------------------------------------------------

  cloacina-tests:
    name: Full Test Suite
    uses: ./.github/workflows/cloacina.yml

  # -----------------------------------------------------------------------
  # Examples & tutorials validation
  # -----------------------------------------------------------------------

  examples-docs:
    name: Examples & Documentation
    uses: ./.github/workflows/examples-docs.yml

  # -----------------------------------------------------------------------
  # Performance tests
  # -----------------------------------------------------------------------

  performance:
    name: Performance Tests
    uses: ./.github/workflows/performance.yml

  # -----------------------------------------------------------------------
  # Code coverage — cargo-tarpaulin on cloacina core
  # -----------------------------------------------------------------------

  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cloacina
          POSTGRES_PASSWORD: cloacina
          POSTGRES_DB: cloacina
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cloacina"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cloacina-coverage"

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Run coverage (cloacina core)
        run: |
          cargo tarpaulin \
            -p cloacina \
            --features postgres,sqlite,macros \
            --out xml \
            --output-dir target/coverage \
            --skip-clean \
            --timeout 300 \
            --exclude-files "crates/cloacina/tests/*" \
            --exclude-files "crates/cloacina/src/python/*" \
            -- --test-threads=1
        env:
          DATABASE_URL: postgres://cloacina:cloacina@localhost:5432/cloacina

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: target/coverage/cobertura.xml
          retention-days: 30

      - name: Coverage summary
        if: always()
        run: |
          if [ -f target/coverage/cobertura.xml ]; then
            echo "Coverage report generated successfully"
            # Extract line rate from cobertura XML
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' target/coverage/cobertura.xml | head -1)
            PERCENT=$(echo "$LINE_RATE * 100" | bc -l 2>/dev/null | head -c 5 || echo "N/A")
            echo "## Coverage: ${PERCENT}%" >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage report not generated" >> $GITHUB_STEP_SUMMARY
          fi

  # -----------------------------------------------------------------------
  # macOS integration — verify builds on macOS
  # -----------------------------------------------------------------------

  macos-integration:
    name: macOS Integration
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install angreal
        run: |
          python -m pip install --upgrade pip
          pip install angreal

      - name: Start PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v7
        with:
          username: cloacina
          password: cloacina
          database: cloacina
          port: 5432

      - name: Install libpq
        run: |
          brew install libpq
          echo "LIBRARY_PATH=$(brew --prefix libpq)/lib" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=$(brew --prefix libpq)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "cloacina-nightly-macos"

      - name: Build workspace
        run: cargo build --features "postgres,sqlite,macros"

      - name: Run unit tests
        run: angreal cloacina unit

  # -----------------------------------------------------------------------
  # Failure notification — auto-create GitHub issue
  # -----------------------------------------------------------------------

  notify-failure:
    name: Notify on Failure
    needs: [cloacina-tests, examples-docs, performance, coverage, macos-integration]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Check for existing nightly-failure issue
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-failure',
              state: 'open',
            });
            core.setOutput('exists', issues.data.length > 0 ? 'true' : 'false');
            if (issues.data.length > 0) {
              core.setOutput('issue_number', issues.data[0].number);
            }

      - name: Create GitHub Issue on failure
        if: steps.check.outputs.exists == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Nightly test failure — ${new Date().toISOString().split('T')[0]}`;
            const body = [
              '## Nightly Test Failure',
              '',
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Date:** ${new Date().toISOString()}`,
              '',
              'One or more nightly tests failed. Check the run logs for details.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['nightly-failure'],
            });

      - name: Comment on existing issue
        if: steps.check.outputs.exists == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: ${{ steps.check.outputs.issue_number }},
              body: `Still failing — [run ${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            });

  # -----------------------------------------------------------------------
  # Close resolved — auto-close nightly-failure issue on success
  # -----------------------------------------------------------------------

  close-resolved:
    name: Close Resolved Issues
    needs: [cloacina-tests, examples-docs, performance, coverage, macos-integration]
    if: success()
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Close nightly-failure issues
        uses: actions/github-script@v7
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-failure',
              state: 'open',
            });

            for (const issue of issues.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Resolved — nightly passed in [run ${context.runId}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
