---
name: Examples & Documentation

on:
  workflow_call:  # Only called by ci.yml

concurrency:
  group: examples-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Step 0: Single build that all tutorial/example jobs share
  # -----------------------------------------------------------------------

  build-cache:
    name: Build Cache
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-examples-build-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Build workspace
        run: cargo build --features "postgres,sqlite,macros"

  # -----------------------------------------------------------------------
  # Rust tutorials
  # -----------------------------------------------------------------------

  rust-tutorials:
    name: Rust Tutorial Tests
    needs: [build-cache]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        tutorial: ["01", "02", "03", "04", "05", "06", "07", "08", "09", "10"]
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install angreal
        run: |
          python -m pip install --upgrade pip
          pip install angreal

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-examples-build-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Docker Compose Cache
        if: contains(fromJSON('["06"]'), matrix.tutorial)
        uses: actions/cache@v4
        with:
          path: ~/.docker
          key: ${{ runner.os }}-docker-${{ hashFiles('.angreal/docker-compose.yaml') }}

      - name: Start backing services
        if: contains(fromJSON('["06"]'), matrix.tutorial)
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          compose-file: ".angreal/docker-compose.yaml"

      - name: Run tutorial ${{ matrix.tutorial }}
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: angreal demos tutorial-${{ matrix.tutorial }}

  # -----------------------------------------------------------------------
  # Rust examples
  # -----------------------------------------------------------------------

  rust-examples:
    name: Rust Example Tests
    needs: [build-cache]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        example: ["cron-scheduling", "multi-tenant", "per-tenant-credentials", "registry-execution"]
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install angreal
        run: |
          python -m pip install --upgrade pip
          pip install angreal

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-examples-build-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Docker Compose Cache
        uses: actions/cache@v4
        with:
          path: ~/.docker
          key: ${{ runner.os }}-docker-${{ hashFiles('.angreal/docker-compose.yaml') }}

      - name: Start PostgreSQL services
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          compose-file: ".angreal/docker-compose.yaml"

      - name: Run ${{ matrix.example }} example
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: angreal demos ${{ matrix.example }}

  # -----------------------------------------------------------------------
  # Python tutorials
  # -----------------------------------------------------------------------

  python-tutorials:
    name: Python Tutorial Tests
    needs: [build-cache]
    timeout-minutes: 30
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          # SQLite tutorials (01-04, 06-11) - tutorial 05 requires PostgreSQL
          - tutorial: "01"
            backend: sqlite
          - tutorial: "02"
            backend: sqlite
          - tutorial: "03"
            backend: sqlite
          - tutorial: "04"
            backend: sqlite
          - tutorial: "06"
            backend: sqlite
          - tutorial: "07"
            backend: sqlite
          - tutorial: "08"
            backend: sqlite
          - tutorial: "09"
            backend: sqlite
          - tutorial: "10"
            backend: sqlite
          - tutorial: "11"
            backend: sqlite
          # PostgreSQL tutorials (01-11, including 05 which requires postgres)
          - tutorial: "01"
            backend: postgres
          - tutorial: "02"
            backend: postgres
          - tutorial: "03"
            backend: postgres
          - tutorial: "04"
            backend: postgres
          - tutorial: "05"
            backend: postgres
          - tutorial: "06"
            backend: postgres
          - tutorial: "07"
            backend: postgres
          - tutorial: "08"
            backend: postgres
          - tutorial: "09"
            backend: postgres
          - tutorial: "10"
            backend: postgres
          - tutorial: "11"
            backend: postgres
    runs-on: ubuntu-latest
    env:
      RUST_BACKTRACE: full

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Install libpq
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore build cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-examples-build-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}

      - name: Install angreal
        run: |
          python -m pip install --upgrade pip
          pip install angreal

      - name: Docker Compose Cache
        if: matrix.backend == 'postgres'
        uses: actions/cache@v4
        with:
          path: ~/.docker
          key: ${{ runner.os }}-docker-${{ hashFiles('.angreal/docker-compose.yaml') }}

      - name: Start PostgreSQL services
        if: matrix.backend == 'postgres'
        uses: hoverkraft-tech/compose-action@v2.0.1
        with:
          compose-file: ".angreal/docker-compose.yaml"

      - name: Run Python tutorial ${{ matrix.tutorial }} (${{ matrix.backend }})
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 3
          command: angreal demos python-tutorial-${{ matrix.tutorial }} --backend ${{ matrix.backend }}

  # -----------------------------------------------------------------------
  # Documentation
  # -----------------------------------------------------------------------

  documentation:
    name: Build Documentation
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install angreal
        run: |
          python -m pip install --upgrade pip
          pip install angreal

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.147.0'
          extended: true

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-rust-docs-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-rust-docs-
            ${{ runner.os }}-rust-

      - name: Cache Hugo modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/hugo
            resources
          key: ${{ runner.os }}-hugo-${{ hashFiles('**/go.mod', '**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      - name: Build documentation
        run: angreal docs build
