---
name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '.metis/**'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'CHANGELOG.md'
      - '.vscode/**'
      - '.idea/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '.metis/**'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'CHANGELOG.md'
      - '.vscode/**'
      - '.idea/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect what changed to conditionally run jobs
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/cloacina/**'
              - 'crates/cloacina-build/**'
              - 'crates/cloacina-computation-graph/**'
              - 'crates/cloacinactl/**'
              - 'crates/cloacina-macros/**'
              - 'crates/cloacina-testing/**'
              - 'crates/cloacina-workflow/**'
              - 'crates/cloacina-workflow-plugin/**'
              - 'Cargo.*'
              - 'rust-toolchain.toml'
            workflows:
              - '.github/workflows/**'

  # Quick gate - only runs if code changed (not for doc-only changes)
  quick-checks:
    name: Quick Checks
    needs: changes
    if: |
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (SQLite)
        run: cargo clippy --features sqlite --all-targets

      - name: Clippy (PostgreSQL)
        run: cargo clippy --features postgres --all-targets

      - name: Cargo check (SQLite)
        run: cargo check --features sqlite

      - name: Cargo check (PostgreSQL)
        run: cargo check --features postgres

  # Rust + Python tests (Python is now native in cloacina core)
  cloacina-tests:
    name: Cloacina Tests
    needs: [quick-checks, changes]
    if: needs.changes.outputs.rust == 'true'
    uses: ./.github/workflows/cloacina.yml
