---
name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '.metis/**'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'CHANGELOG.md'
      - '.vscode/**'
      - '.idea/**'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - '.metis/**'
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.gitignore'
      - '.editorconfig'
      - 'CHANGELOG.md'
      - '.vscode/**'
      - '.idea/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect what changed to conditionally run jobs
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      workflows: ${{ steps.filter.outputs.workflows }}
      harness: ${{ steps.filter.outputs.harness }}
      examples: ${{ steps.filter.outputs.examples }}
      charts: ${{ steps.filter.outputs.charts }}
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            rust:
              - 'crates/cloacina/**'
              - 'crates/cloacina-build/**'
              - 'crates/cloacina-computation-graph/**'
              - 'crates/cloacinactl/**'
              - 'crates/cloacina-macros/**'
              - 'crates/cloacina-testing/**'
              - 'crates/cloacina-workflow/**'
              - 'crates/cloacina-workflow-plugin/**'
              - 'Cargo.*'
              - 'rust-toolchain.toml'
            workflows:
              - '.github/workflows/**'
            harness:
              - '.angreal/**'
            examples:
              - 'examples/**'
            charts:
              - 'charts/**'
              # Dockerfile is the basis for the helm e2e image — touch it,
              # rebuild + re-run the kind install.
              - 'Dockerfile'
              - '.dockerignore'
            # Public API contract surface (CLOACI-T-0643): anything that can
            # change the OpenAPI document, or the committed document itself.
            api:
              - 'crates/cloacina-server/**'
              - 'crates/cloacina-api-types/**'
              - 'docs/static/openapi.json'
              - 'Cargo.*'

  # Quick gate - only runs if code, harness, or workflows changed
  quick-checks:
    name: Quick Checks
    needs: changes
    if: |
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.harness == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-check-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-check-

      - name: Credential-logging guard (OPS-03 / T-0443)
        run: python3 scripts/check_credential_logging.py

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (SQLite)
        run: cargo clippy --features sqlite --all-targets

      - name: Clippy (PostgreSQL)
        run: cargo clippy --features postgres --all-targets

      - name: Cargo check (SQLite)
        run: cargo check --features sqlite

      - name: Cargo check (PostgreSQL)
        run: cargo check --features postgres

  # OpenAPI spec drift gate (CLOACI-T-0643 / NFR-001): the committed
  # docs/static/openapi.json must match a fresh `emit-openapi` from the
  # server. Fails when routes/DTOs change without regenerating the spec.
  spec-check:
    name: OpenAPI Spec Drift
    needs: changes
    if: |
      needs.changes.outputs.api == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-spec-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-spec-
            ${{ runner.os }}-cargo-check-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install angreal
        run: |
          python -m pip install --upgrade pip
          pip install angreal

      - name: Spec drift check
        run: angreal docs spec-check

  # Rust + Python tests (Python is now native in cloacina core)
  cloacina-tests:
    name: Cloacina Tests
    needs: [quick-checks, changes]
    if: |
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.harness == 'true' ||
      needs.changes.outputs.workflows == 'true'
    uses: ./.github/workflows/cloacina.yml

  # Tutorial / feature demo matrix — verifies the `angreal demos …` surface
  examples-docs:
    name: Examples & Docs
    needs: [quick-checks, changes]
    if: |
      needs.changes.outputs.rust == 'true' ||
      needs.changes.outputs.harness == 'true' ||
      needs.changes.outputs.workflows == 'true' ||
      needs.changes.outputs.examples == 'true'
    uses: ./.github/workflows/examples-docs.yml

  # Helm chart lint + template (CLOACI-I-0111 / T-0605)
  helm-chart:
    name: Helm chart lint
    needs: changes
    if: |
      needs.changes.outputs.charts == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: helm dependency update
        # Vendors Bitnami postgresql subchart (conditional dep). Required
        # before `helm template` even when the dep's condition is false —
        # helm validates dep presence regardless of condition resolution.
        run: helm dependency update charts/cloacina-server

      - name: helm lint
        run: helm lint charts/cloacina-server

      - name: helm template (BYO Postgres via database.url)
        run: |
          helm template cloacina charts/cloacina-server \
            --set database.url=postgres://u:p@h:5432/d \
            > /tmp/render-byo.yaml
          test -s /tmp/render-byo.yaml

      - name: helm template (BYO Postgres via secret ref)
        run: |
          helm template cloacina charts/cloacina-server \
            --set databaseUrlSecretRef.name=cloacina-db \
            > /tmp/render-secret.yaml
          test -s /tmp/render-secret.yaml

      - name: helm template (bundled Postgres)
        run: |
          helm template cloacina charts/cloacina-server \
            --set postgresql.enabled=true \
            --set postgresql.auth.password=test \
            > /tmp/render-bundled.yaml
          test -s /tmp/render-bundled.yaml

      - name: helm template (extras — ingress + serviceMonitor)
        run: |
          helm template cloacina charts/cloacina-server \
            --set databaseUrlSecretRef.name=stub \
            --set ingress.enabled=true \
            --set serviceMonitor.enabled=true \
            > /tmp/render-extras.yaml
          test -s /tmp/render-extras.yaml

      - name: Validate fail-fast on missing database wiring
        run: |
          set +e
          helm template cloacina charts/cloacina-server > /tmp/render-fail.yaml 2> /tmp/render-fail.err
          rc=$?
          set -e
          if [ "${rc}" = "0" ]; then
            echo "expected helm template to fail when no database is configured" >&2
            exit 1
          fi
          grep -q "configure exactly one of" /tmp/render-fail.err || {
            echo "expected validateDatabase fail message in stderr" >&2
            cat /tmp/render-fail.err >&2
            exit 1
          }

  # End-to-end Helm chart install on a kind cluster (CLOACI-I-0111 / T-0605).
  # Builds the cloacina-server image, loads it into kind, helm-installs the
  # chart with bundled Postgres, and verifies /health returns 200.
  helm-chart-e2e:
    name: Helm chart e2e (kind)
    needs: [helm-chart, changes]
    if: |
      needs.changes.outputs.charts == 'true' ||
      needs.changes.outputs.workflows == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build cloacina-server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: cloacina-server:e2e
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: cloacina-helm-e2e
          wait: 120s

      - name: Load image into kind
        run: kind load docker-image cloacina-server:e2e --name cloacina-helm-e2e

      - name: helm dependency update
        run: helm dependency update charts/cloacina-server

      - name: helm install (bundled postgres)
        run: |
          set -euo pipefail
          PASSWORD=$(openssl rand -hex 16)
          # CLOACI-T-0610 — the embedded subchart pulls official
          # docker.io/library/postgres:17, which never needs the
          # bitnamilegacy override the prior Bitnami subchart did.
          helm install cloacina charts/cloacina-server \
            --namespace cloacina-e2e --create-namespace \
            --set image.repository=cloacina-server \
            --set image.tag=e2e \
            --set image.pullPolicy=Never \
            --set postgresql.enabled=true \
            --set postgresql.auth.password="${PASSWORD}" \
            --wait --timeout=8m

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/cloacina-cloacina-server \
            -n cloacina-e2e --timeout=5m

      - name: Curl /health from inside the cluster
        run: |
          set -euo pipefail
          # `kubectl run` with curlimages/curl, --rm cleans up the pod.
          kubectl run healthcheck \
            -n cloacina-e2e \
            --rm --restart=Never -i \
            --image=curlimages/curl:8.10.1 \
            --command -- curl -fsS -o /dev/null -w "HTTP %{http_code}\n" \
            http://cloacina-cloacina-server:8080/health \
          | tee /tmp/health.out
          grep -q "HTTP 200" /tmp/health.out

      - name: Diagnostics on failure
        if: failure()
        run: |
          echo "=== pods ==="
          kubectl get pods -n cloacina-e2e
          echo "=== events ==="
          kubectl get events -n cloacina-e2e --sort-by=.lastTimestamp
          echo "=== server logs ==="
          kubectl logs -l app.kubernetes.io/instance=cloacina \
            -n cloacina-e2e --tail=200 || true
          echo "=== describe ==="
          kubectl describe pods -l app.kubernetes.io/instance=cloacina \
            -n cloacina-e2e || true
